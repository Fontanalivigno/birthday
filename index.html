<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Buon Compleanno!</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#6B2340;height:100vh;height:100dvh;overflow:hidden;font-family:"Inter",sans-serif;}
.confetti-container{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10;opacity:0;transition:opacity 0.5s;}
.confetti-container.attivo{opacity:1;}
.confetto{position:absolute;top:-20px;opacity:0;animation:confettiFall linear infinite;}
@keyframes confettiFall{0%{transform:translateY(-20px) rotate(0deg) scale(0);opacity:0;}10%{opacity:1;transform:translateY(0) rotate(36deg) scale(1);}90%{opacity:0.8;}100%{transform:translateY(100vh) rotate(720deg) scale(0.5);opacity:0;}}
.fiorellino{position:absolute;top:-40px;opacity:0;animation:fioreFall linear infinite;}
@keyframes fioreFall{0%{transform:translateY(-40px) translateX(0) rotate(0deg) scale(0);opacity:0;}8%{opacity:1;transform:translateY(0) rotate(20deg) scale(1);}25%{transform:translateY(25vh) translateX(30px) rotate(120deg) scale(1);}50%{transform:translateY(50vh) translateX(-20px) rotate(240deg) scale(0.95);opacity:0.9;}75%{transform:translateY(75vh) translateX(25px) rotate(340deg) scale(0.85);opacity:0.6;}100%{transform:translateY(110vh) translateX(-10px) rotate(440deg) scale(0.7);opacity:0;}}
.stella{position:fixed;font-size:36px;color:#D4B896;opacity:0;pointer-events:none;z-index:5;}
.stella.attiva{animation:brillare 2s ease-in-out infinite;}
@keyframes brillare{0%,100%{opacity:0;transform:scale(0.5) rotate(0deg);}50%{opacity:1;transform:scale(1.3) rotate(180deg);}}
.sezione-pacco{height:100vh;height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;z-index:20;}
.regalo-box{height:55vw;display:flex;align-items:center;justify-content:center;}
.regalo{font-size:50vw;display:block;opacity:0;transform:scale(0) rotate(-20deg);}
@keyframes arriva{0%{opacity:0;transform:scale(0) rotate(-20deg);}60%{opacity:1;transform:scale(1.15) rotate(5deg);}80%{transform:scale(0.95) rotate(-2deg);}100%{opacity:1;transform:scale(1) rotate(0deg);}}
@keyframes trema{0%,100%{transform:rotate(0deg) scale(1);}10%{transform:rotate(-15deg) scale(1.05);}20%{transform:rotate(15deg) scale(1.05);}30%{transform:rotate(-12deg) scale(1.03);}40%{transform:rotate(12deg) scale(1.03);}50%{transform:rotate(-8deg) scale(1.02);}60%{transform:rotate(8deg) scale(1.02);}70%{transform:rotate(-5deg) scale(1.01);}80%{transform:rotate(5deg) scale(1.01);}90%{transform:rotate(-2deg) scale(1);}}
@keyframes tremaForte{0%,100%{transform:rotate(0deg) scale(1);}8%{transform:rotate(-22deg) scale(1.1);}16%{transform:rotate(22deg) scale(1.1);}24%{transform:rotate(-18deg) scale(1.08);}32%{transform:rotate(18deg) scale(1.08);}40%{transform:rotate(-14deg) scale(1.06);}48%{transform:rotate(14deg) scale(1.06);}56%{transform:rotate(-10deg) scale(1.04);}64%{transform:rotate(10deg) scale(1.04);}72%{transform:rotate(-6deg) scale(1.02);}80%{transform:rotate(6deg) scale(1.02);}90%{transform:rotate(-3deg) scale(1);}}
@keyframes esplodi{0%{transform:scale(1) rotate(0deg);opacity:1;}20%{transform:scale(1.5) rotate(10deg);opacity:1;}100%{transform:scale(0) rotate(-30deg);opacity:0;}}
.sezione-contenuti{display:none;position:relative;z-index:20;}
.sezione-contenuti.visibile{display:block;}
.pagina-unica{height:100vh;height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2vw 5vw;text-align:center;}
.reveal-item{display:none;width:100%;}
.reveal-item.visibile-bounce{display:block;animation:bounceIn 1s cubic-bezier(0.34,1.56,0.64,1) forwards;}
.reveal-item.visibile-fade{display:block;animation:fadeIn 0.8s ease-out forwards;}
.titolo-auguri{color:#D4B896;font-family:"Playfair Display",serif;font-size:19vw;margin-bottom:2vw;line-height:1.1;text-shadow:0 0 40px #D4B89644;}
.messaggio-auguri{color:#cc9999;font-size:8vw;line-height:1.5;font-family:"Playfair Display",serif;font-style:italic;margin-bottom:4vw;}
.gocce-cerchio{width:62vw;height:62vw;border-radius:50%;background:linear-gradient(135deg,#D4B896,#C4A070);margin:0 auto 4vw;display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:0 0 60px #D4B89644,0 0 120px #D4B89622;}
.gocce-numero{color:#4A1229;font-size:22vw;font-weight:bold;line-height:1;}
.gocce-testo{color:#4A1229;font-size:7vw;font-weight:bold;letter-spacing:1.5vw;margin-top:0.5vw;}
.gocce-posttesto{color:#4A1229;font-size:5.5vw;font-weight:bold;letter-spacing:0.5vw;text-transform:uppercase;margin-top:1.5vw;}
@keyframes bounceIn{0%{opacity:0;transform:scale(0) rotate(-10deg);}50%{transform:scale(1.2) rotate(5deg);}70%{transform:scale(0.9) rotate(-2deg);}100%{opacity:1;transform:scale(1) rotate(0deg);}}
.btn-card{display:inline-block;margin-top:1vw;padding:4.5vw 12vw;background:#D4B896;color:#4A1229;text-decoration:none;border-radius:12vw;font-weight:bold;font-size:5.5vw;letter-spacing:0.5vw;box-shadow:0 4px 20px rgba(212,184,150,0.4);transition:transform 0.3s,box-shadow 0.3s;}
.btn-card:hover{transform:scale(1.05);box-shadow:0 6px 30px rgba(212,184,150,0.6);}
.btn-card:active{transform:scale(0.97);}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
@media screen and (min-width:700px){.titolo-auguri{font-size:100px;}.messaggio-auguri{font-size:42px;}.gocce-cerchio{width:320px;height:320px;}.gocce-numero{font-size:110px;}.gocce-testo{font-size:30px;}.gocce-posttesto{font-size:24px;}.regalo{font-size:280px;}.regalo-box{height:320px;}.btn-card{font-size:24px;padding:22px 55px;}}
</style>
</head>
<body>

<div class="confetti-container" id="confetti"></div>

<div class="sezione-pacco" id="sezionePacco">
  <div class="regalo-box" id="regaloBox">
    <div class="regalo" id="regalo">&#127873;</div>
  </div>
</div>

<div class="sezione-contenuti" id="sezioneContenuti">
  <div class="pagina-unica">
    <div class="reveal-item" id="titolo"><div class="titolo-auguri" id="titoloAuguri"></div></div>
    <div class="reveal-item" id="messaggio"><div class="messaggio-auguri" id="messaggioAuguri"></div></div>
    <div class="reveal-item" id="cerchio">
      <div class="gocce-cerchio">
        <div class="gocce-numero">+30</div>
        <div class="gocce-testo" id="gocceTesto"></div>
        <div class="gocce-posttesto" id="goccePosttesto"></div>
      </div>
    </div>
    <div class="reveal-item" id="btnCard"><a id="linkCard" href="#" class="btn-card" target="_blank"></a></div>
  </div>
</div>

<script>
var params = new URLSearchParams(window.location.search);
var nome = params.get('nome') || 'Amico';
var lingua = params.get('lang') || 'IT';
var cardUrl = params.get('card') || '#';

var testi = {
  IT: { auguri:'Tanti auguri', msg:'Che questo giorno profumi<br>solo di cose belle!', gocce:'GOCCE', regalo:'In regalo!', btn:'Vedi la tua boccetta' },
  EN: { auguri:'Happy Birthday', msg:'May this day smell<br>only of beautiful things!', gocce:'DROPS', regalo:'As a gift!', btn:'See your bottle' }
};
var t = testi[lingua] || testi['IT'];

document.getElementById('titoloAuguri').innerHTML = t.auguri + '<br>' + decodeURIComponent(nome) + '!';
document.getElementById('messaggioAuguri').innerHTML = t.msg;
document.getElementById('gocceTesto').textContent = t.gocce;
document.getElementById('goccePosttesto').textContent = t.regalo;
document.getElementById('linkCard').textContent = t.btn;
document.getElementById('linkCard').href = decodeURIComponent(cardUrl);

var confettiContainer = document.getElementById('confetti');
var colori = ['#D4B896','#C4636C','#2D9B8A','#FFD700','#FF69B4','#87CEEB','#FFA500','#FF6347','#9370DB','#00CED1'];
var fiori = ['&#127800;','&#127802;','&#127799;','&#127804;','&#128174;'];

for (var i = 0; i < 35; i++) {
  var el = document.createElement('div');
  el.className = 'confetto';
  el.style.left = Math.floor(Math.random()*100) + '%';
  var size = Math.floor(Math.random()*8)+5;
  el.style.width = size + 'px';
  el.style.height = size + 'px';
  el.style.background = colori[i%colori.length];
  el.style.animationDelay = (Math.random()*5).toFixed(1) + 's';
  el.style.animationDuration = (Math.random()*3+3).toFixed(1) + 's';
  if(i%3===0) el.style.borderRadius='50%';
  confettiContainer.appendChild(el);
}
for (var f = 0; f < 25; f++) {
  var fl = document.createElement('div');
  fl.className = 'fiorellino';
  fl.innerHTML = fiori[f%fiori.length];
  fl.style.left = Math.floor(Math.random()*100) + '%';
  fl.style.fontSize = (Math.floor(Math.random()*12)+16) + 'px';
  fl.style.animationDelay = (Math.random()*6).toFixed(1) + 's';
  fl.style.animationDuration = (Math.random()*4+5).toFixed(1) + 's';
  confettiContainer.appendChild(fl);
}

for (var j = 0; j < 15; j++) {
  var st = document.createElement('div');
  st.className = 'stella';
  st.innerHTML = '&#10022;';
  st.style.left = Math.floor(Math.random()*100) + '%';
  st.style.top = Math.floor(Math.random()*100) + '%';
  st.dataset.delay = (Math.random()*3+4).toFixed(1);
  document.body.appendChild(st);
}

var regalo = document.getElementById('regalo');
var stelle = document.querySelectorAll('.stella');

setTimeout(function(){regalo.style.animation='arriva 1s cubic-bezier(0.34,1.56,0.64,1) forwards';},500);
setTimeout(function(){regalo.style.opacity='1';regalo.style.transform='scale(1) rotate(0deg)';regalo.style.animation='none';void regalo.offsetWidth;regalo.style.animation='trema 0.5s ease-in-out';},2000);
setTimeout(function(){regalo.style.animation='none';void regalo.offsetWidth;regalo.style.animation='trema 0.5s ease-in-out';},2700);
setTimeout(function(){regalo.style.animation='none';void regalo.offsetWidth;regalo.style.animation='tremaForte 0.6s ease-in-out';},3300);
setTimeout(function(){regalo.style.animation='none';void regalo.offsetWidth;regalo.style.animation='esplodi 0.8s ease-out forwards';document.getElementById('confetti').classList.add('attivo');for(var i=0;i<stelle.length;i++){stelle[i].classList.add('attiva');}},4000);
setTimeout(function(){document.getElementById('sezionePacco').style.display='none';document.getElementById('sezioneContenuti').classList.add('visibile');document.getElementById('titolo').classList.add('visibile-bounce');},4800);
setTimeout(function(){document.getElementById('messaggio').classList.add('visibile-fade');},5700);
setTimeout(function(){document.getElementById('cerchio').classList.add('visibile-bounce');},7000);
setTimeout(function(){document.getElementById('btnCard').classList.add('visibile-fade');},7800);
</script>
</body>
</html>
